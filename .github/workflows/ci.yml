name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    name: Test
    strategy:
      matrix:
        scala: [ 2.13.x, 3.x ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install JDK 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: '11'
          java-package: jdk

      - name: Install SBT
        uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23

      - name: Cache SBT
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1
        with:
          extraKey: v1

      - name: Lint
        run: sbt ++${{ matrix.scala }} scalafmtCheckAll

      - name: Compile
        run: sbt ++${{ matrix.scala }} Test/compile

      - name: Start Containers
        run: docker compose up -d

      - name: Test
        run: sbt ++${{ matrix.scala }} modules/test

      - name: Check Doc Site
        if: ${{ startsWith(matrix.scala, '2.13.') }}
        run: sbt ++${{ matrix.scala }} docs/makeSite
